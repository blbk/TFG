<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de brillo para las partículas -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Degradado sutil para los bordes del cubo -->
    <linearGradient id="cubeStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43C6AC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(200, 200)">
    
    <!-- SISTEMA DE PARTÍCULAS (6 ÓRBITAS SIN LÍNEAS) -->
    <!-- Nota: Las partículas están detrás del cubo en el orden Z visual -->
    
    <!-- Partícula 1 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      <circle cx="120" cy="0" r="7" fill="#0052D4" filter="url(#glow)" transform="rotate(-20)"/>
    </g>
    <!-- Partícula 2 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      <circle cx="130" cy="0" r="7" fill="#43C6AC" filter="url(#glow)" transform="rotate(40)"/>
    </g>
    <!-- Partícula 3 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="45s" repeatCount="indefinite"/>
      <circle cx="140" cy="0" r="7" fill="#003380" filter="url(#glow)" transform="rotate(100)"/>
    </g>
    <!-- Partícula 4 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
      <circle cx="150" cy="0" r="7" fill="#0052D4" filter="url(#glow)" transform="rotate(160)"/>
    </g>
    <!-- Partícula 5 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      <circle cx="130" cy="0" r="7" fill="#43C6AC" filter="url(#glow)" transform="rotate(220)"/>
    </g>
    <!-- Partícula 6 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite"/>
      <circle cx="150" cy="0" r="7" fill="#003380" filter="url(#glow)" transform="rotate(280)"/>
    </g>

    <!-- CUBO 3D TRANSPARENTE GIRATORIO -->
    <g>
      <!-- Animación de rotación sobre el eje Y simulada en 2D -->
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite"/>
      
      <!-- Cara Superior (Más clara para simular luz cenital) -->
      <polygon points="0,-80 90,-35 0,10 -90,-35" 
               fill="rgba(255,255,255,0.1)" stroke="url(#cubeStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Cara Izquierda (Semi-transparente) -->
      <polygon points="-90,-35 0,10 0,110 -90,65" 
               fill="rgba(0,82,212,0.15)" stroke="url(#cubeStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Cara Derecha (Ligeramente más oscura para dar volumen) -->
      <polygon points="90,-35 0,10 0,110 90,65" 
               fill="rgba(67,198,172,0.15)" stroke="url(#cubeStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Aristas internas traseras (para reforzar la transparencia) -->
      <line x1="0" y1="10" x2="0" y2="-80" stroke="url(#cubeStroke)" stroke-width="1" opacity="0.5"/>
      <line x1="-90" y1="-35" x2="0" y2="-80" stroke="url(#cubeStroke)" stroke-width="1" opacity="0.5"/>
      <line x1="90" y1="-35" x2="0" y2="-80" stroke="url(#cubeStroke)" stroke-width="1" opacity="0.5"/>
    </g>
    
  </g>
</svg>