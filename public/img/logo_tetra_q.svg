<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de brillo sutil -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Degradado para bordes del tetraedro -->
    <linearGradient id="tetraStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43C6AC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(200, 200)">
    
    <!-- ============================================ -->
    <!-- CAPA 1: 4 HEXÁGONOS HUECOS ROTATORIOS        -->
    <!-- ============================================ -->
    
    <!-- Partícula 1: Horizontal derecha (0°) -->
    <g>
      <path id="orb1" d="M 140,0 A 140,45 0 1,0 -140,0 A 140,45 0 1,0 140,0" fill="none" stroke="none"/>
      <g>
        <!-- Rotación sobre su propio eje -->
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="48s" repeatCount="indefinite"/>
        <polygon points="0,-7 6.06,-3.5 6.06,3.5 0,7 -6.06,3.5 -6.06,-3.5" 
                 fill="none" stroke="#0052D4" stroke-width="1.5" filter="url(#glow)">
          <animateMotion dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
            <mpath href="#orb1"/>
          </animateMotion>
        </polygon>
      </g>
    </g>

    <!-- Partícula 2: Vertical arriba (90°) -->
    <g transform="rotate(90)">
      <path id="orb2" d="M 140,0 A 140,45 0 1,0 -140,0 A 140,45 0 1,0 140,0" fill="none" stroke="none"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="32s" repeatCount="indefinite"/>
        <polygon points="0,-7 6.06,-3.5 6.06,3.5 0,7 -6.06,3.5 -6.06,-3.5" 
                 fill="none" stroke="#43C6AC" stroke-width="1.5" filter="url(#glow)">
          <animateMotion dur="10s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
            <mpath href="#orb2"/>
          </animateMotion>
        </polygon>
      </g>
    </g>

    <!-- Partícula 3: Horizontal izquierda (180°) -->
    <g transform="rotate(180)">
      <path id="orb3" d="M 140,0 A 140,45 0 1,0 -140,0 A 140,45 0 1,0 140,0" fill="none" stroke="none"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
        <polygon points="0,-7 6.06,-3.5 6.06,3.5 0,7 -6.06,3.5 -6.06,-3.5" 
                 fill="none" stroke="#003380" stroke-width="1.5" filter="url(#glow)">
          <animateMotion dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
            <mpath href="#orb3"/>
          </animateMotion>
        </polygon>
      </g>
    </g>

    <!-- Partícula 4: Vertical abajo (270°) -->
    <g transform="rotate(270)">
      <path id="orb4" d="M 140,0 A 140,45 0 1,0 -140,0 A 140,45 0 1,0 140,0" fill="none" stroke="none"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="136s" repeatCount="indefinite"/>
        <polygon points="0,-7 6.06,-3.5 6.06,3.5 0,7 -6.06,3.5 -6.06,-3.5" 
                 fill="none" stroke="#0052D4" stroke-width="1.5" filter="url(#glow)">
          <animateMotion dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
            <mpath href="#orb4"/>
          </animateMotion>
        </polygon>
      </g>
    </g>

    <!-- ============================================ -->
    <!-- CAPA 2: TETRAEDRO                            -->
    <!-- ============================================ -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0" to="360" 
        dur="25s" 
        repeatCount="indefinite"
        calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1"
      />
      
      <!-- Cara Superior -->
      <polygon points="0,-100 -86.6,50 86.6,50" 
               fill="rgba(0,82,212,0.25)" stroke="url(#tetraStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Cara Inferior Izquierda -->
      <polygon points="-86.6,50 0,0 0,-100" 
               fill="rgba(67,198,172,0.20)" stroke="url(#tetraStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Cara Inferior Derecha -->
      <polygon points="86.6,50 0,0 0,-100" 
               fill="rgba(255,255,255,0.15)" stroke="url(#tetraStroke)" stroke-width="2" stroke-linejoin="round"/>
               
      <!-- Líneas internas cristal -->
      <line x1="0" y1="0" x2="0" y2="-100" stroke="url(#tetraStroke)" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="0" x2="-86.6" y2="50" stroke="url(#tetraStroke)" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="0" x2="86.6" y2="50" stroke="url(#tetraStroke)" stroke-width="1.5" opacity="0.6"/>
    </g>
    
  </g>
</svg>