<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMDB - Inicio de Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/estilos_login.css">
</head>
<body>

    <div class="login-container">
        
        <div class="panel-izq">
            <div class="logo-container">
                 <img src="img/logo_cmdb.svg" alt="logotipo de la CMDB">
            </div>
            
            <h1>CMDB</h1>
            <p>Gestión de Configuración y Activos</p>
            
            <div class="txt-tfg">Trabajo de Fin de Grado</div>
        </div>

        <div class="panel-dch">
            <h2>Bienvenido <span>| Acceso</span></h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <i class="far fa-user"></i>
                    <input type="text" id="usuario" class="form-control" placeholder="Nombre de Usuario" required autocomplete="login del usuario">
                </div>
                
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Contraseña" required autocomplete="contraseña de acceso">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        Recuérdame
                    </label>
                    <a href="#" class="enlace-azul">Olvidé mi contraseña</a>
                </div>
                
                <button type="submit" class="btn-submit">INICIAR SESIÓN</button>
                
                <div class="signup-text">
                    ¿No tienes cuenta? <a href="#" class="enlace-azul">Solicitud de Acceso</a>
                </div>
                <p id="mensaje"></p>
            </form>
        </div>

    </div>

    <footer>
        <p>Javier Moyano Vizcaíno.</p>
        <p><a href="https://www.unir.net/" target="_blank">
            <p>Grado en Ingeniería Informática</p>
            <p>Universidad Internacional de La Rioja</p>
            <p>Escuela Superior de Ingeniería y Tecnología</p>
        </a></p>
    </footer>

    <script src="./js/valida_login.js"></script>
</body>
</html>
