<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
	    :root {
            --azul-itil: #0098cd;	/* 	#004b8d */
            --negro-itil: #333333;
            --claro: #ffffff;		/*  #808b96 */
            --gris-borde: #cccccc;
        }
		
      /* --- Animaciones (Giros) --- */
      @keyframes girarHorario {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes girarAntihorario {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }

      @keyframes girarMuyLento {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

	  /* Estilo de los objetos y tiempo de giro          */
	  
      /* Hexágono exterior del logo (Segmentado y claro) */
      .hex-ext {
        animation: girarHorario 100s linear infinite;
		stroke: var(--claro);
        fill: none;
        stroke-width: 8;
        stroke-linecap: round;
      }

      /* Hexágono interior (Sólido y Azul) */
      .hex-int {
        animation: girarAntihorario 10s linear infinite;
		stroke: var(--azul-itil);
        stroke-width: 6;
        fill: var(--negro-itil);
      }

      /* Flechas radiales del logo original (Azules y muy lentas) */
      .flechas-radiales {
        animation: girarMuyLento 25s linear infinite;
		stroke: var(--azul-itil);
        stroke-width: 8;
      }

      /* Elementos de conexión estáticos o de red */
      .nodos-red {
		fill: var(--claro);
      }
	  
      /* --- Clases de Control (Centro de giro) --- */
      .centro-pivote {
        transform-origin: 200px 200px;
      }

    </style>
  </defs>

<!--
  <rect width="400" height="400" fill="#f5f7f9" rx="20" /> 
-->

  <g class="centro-pivote flechas-radiales">
    <line x1="200" y1="200" x2="270" y2="130" stroke-dasharray="4,2" />
    <polygon points="290,110 275,115 285,125" fill="var(--azul-itil)" stroke="none" />
    
    <line x1="200" y1="200" x2="130" y2="270" stroke-dasharray="4,2" />
    <polygon points="110,290 125,285 115,275" fill="var(--azul-itil)" stroke="none" />
  </g>

  <g class="centro-pivote hex-ext">
    <path d="M 200 120 L 130 160 L 130 240 L 200 280 L 270 240 L 270 160 Z" stroke-dasharray="40, 15" />
  </g>

  <g class="centro-pivote hex-ext">
    <circle cx="130" cy="160" r="20" class="nodos-red" stroke="none"/>
    <circle cx="270" cy="240" r="14" class="nodos-red" stroke="none"/>
    <circle cx="200" cy="120" r="12" fill="var(--azul-itil)" stroke="none"/>
  </g>

  <g class="centro-pivote hex-int">
    <polygon points="200,175 221.6,187.5 221.6,212.5 200,225 178.4,212.5 178.4,187.5" />
  </g>

  <!-- <circle cx="200" cy="200" r="16" fill="#fff" /> -->
</svg>
